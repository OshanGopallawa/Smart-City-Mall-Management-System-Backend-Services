version: '3.9'
services:
  analytics-service:
    build:
      context: .
      target: production
    container_name: analytics-service
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3004
    networks:
      - mall-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mall-network:
    driver: bridge
    name: smart-city-mall-network
