version: '3.9'
services:
  mall-api-service:
    build:
      context: .
      target: production
    container_name: mall-api-service
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3003
    networks:
      - mall-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mall-network:
    driver: bridge
    name: smart-city-mall-network
