version: '3.9'

services:
  user-service:
    build:
      context: .
      target: production
    container_name: user-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - mall-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mall-network:
    driver: bridge
    name: smart-city-mall-network
